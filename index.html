<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F8FAFC" />
    <title>Hirvia</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f8fafc;
      }

      .web-splash {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
      }

      .web-splash-mark {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        background: #0f172a;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        font-weight: 900;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
      }

      .web-splash-name {
        font-size: 34px;
        line-height: 1;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="web-splash" aria-label="Hirvia loading">
        <div class="web-splash-mark">H</div>
        <div class="web-splash-name">Hirvia</div>
      </div>
    </div>
  </body>
</html>
